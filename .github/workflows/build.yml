name: Build

run-name: Build ${{ github.ref_name }}

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  build:
    name: Build

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.12" ]
        include:
          - python-version: "3.13"
            os: ubuntu-latest
          - python-version: "3.11"
            os: ubuntu-latest
          - python-version: "3.9"
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install jpeg
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libjpeg-dev zlib1g-dev
      - name: Install dependencies
        run: make install
      - name: Test
        run: make test

  build-captcha:
    name: Build (3.12, [captcha] extra)

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install jpeg
        run: sudo apt-get install -y libjpeg-dev zlib1g-dev
      - name: Install with [captcha] extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,captcha]"
      - name: Test
        run: python -m pytest -v --ignore=tests/integration

  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml
    secrets: inherit