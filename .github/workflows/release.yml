name: Release

run-name: Release ${{ inputs.bump_type }}

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prereq:
    uses: alexdlaird/.github/.github/workflows/release-prereq.yml@main
    with:
      bump_type: ${{ inputs.bump_type }}
      version_file: 'amazonorders/__init__.py'
      version_pattern: 's/^__version__ = ".*"/__version__ = "${VERSION}"/'
      additional_bump_files: |
        docs/index.rst
        README.md
      repo_slug: alexdlaird/amazon-orders
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  build:
    needs: prereq
    uses: alexdlaird/amazon-orders/.github/workflows/build.yml@main
    secrets: inherit

  integration:
    needs: prereq
    if: ${{ vars.AMAZON_INTEGRATION_SKIP_ON_RELEASE != 'true' }}
    uses: ./.github/workflows/integration.yml
    with:
      use_waf_solver: true
    secrets: inherit

  release:
    needs: [prereq, build, integration]
    if: ${{ always() && needs.prereq.result == 'success' && needs.build.result == 'success' && (needs.integration.result == 'success' || needs.integration.result == 'skipped') }}
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prereq.outputs.squash_commit_sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install jpeg
        run: sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.prereq.outputs.version }}
          SHA: ${{ needs.prereq.outputs.squash_commit_sha }}
          RELEASE_NOTES: ${{ needs.prereq.outputs.release_notes }}
        run: |
          gh release create "$VERSION" \
            --target "$SHA" \
            --title "$VERSION" \
            --notes "$RELEASE_NOTES"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: make upload

  cleanup:
    needs: [prereq, release]
    if: always() && needs.prereq.result == 'success'
    uses: alexdlaird/.github/.github/workflows/release-cleanup.yml@main
    secrets:
      bot_app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
      bot_private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
