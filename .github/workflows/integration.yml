name: Integration Test

run-name: Integration Test ${{ github.ref_name }}

on:
  workflow_call:
    inputs:
      use_waf_solver:
        description: 'Use third-party WAF solver (CapSolver)'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      use_waf_solver:
        description: 'Use third-party WAF solver (CapSolver)'
        required: false
        type: boolean
        default: false
  schedule:
   - cron: "0 7 * * *"

permissions:
  contents: read
  issues: none
  pull-requests: none

concurrency:
  group: amazon-orders-integration-singleton

jobs:
  test:
    name: Integration Test

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      DEBUG: "True"
      AMAZON_USERNAME: ${{ secrets.AMAZON_USERNAME }}
      AMAZON_PASSWORD: ${{ secrets.AMAZON_PASSWORD }}
      AMAZON_OTP_SECRET_KEY: ${{ secrets.AMAZON_OTP_SECRET_KEY }}
      CAPSOLVER_API_KEY: ${{ (inputs.use_waf_solver || github.event_name == 'schedule') && secrets.CAPSOLVER_API_KEY || '' }}
      # The following variables are not required, defaults will be used if they are not defined
      AMAZON_BASE_URL: ${{ vars.AMAZON_BASE_URL }}
      AMAZON_INTEGRATION_TEST_JSON: ${{ vars.AMAZON_INTEGRATION_TEST_JSON }}
      AMAZON_INTEGRATION_TEST_AUTH: ${{ vars.AMAZON_INTEGRATION_TEST_AUTH }}
      AMAZON_INTEGRATION_TEST_AUTH_WRONG_PASSWORD: ${{ vars.AMAZON_INTEGRATION_TEST_AUTH_WRONG_PASSWORD }}
      AMAZON_INTEGRATION_TEST_YEAR: ${{ vars.AMAZON_INTEGRATION_TEST_YEAR }}
      AMAZON_START_INDEX: ${{ vars.AMAZON_START_INDEX }}
      AMAZON_TRANSACTIONS_DAYS: ${{ vars.AMAZON_TRANSACTIONS_DAYS }}
      AMAZON_FULL_DETAILS_LOOP_COUNT: ${{ vars.AMAZON_FULL_DETAILS_LOOP_COUNT }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install jpeg
        run: sudo apt-get install -y libjpeg-dev zlib1g-dev
      - name: Verify WAF solver secret is set
        if: ${{ inputs.use_waf_solver || github.event_name == 'schedule' }}
        run: |
          if [ -z "$CAPSOLVER_API_KEY" ]; then
            echo "::error::WAF solver enabled but CAPSOLVER_API_KEY is empty. Set the CAPSOLVER_API_KEY repo secret or disable the toggle."
            exit 1
          fi
      - name: Configure third-party WAF solver
        if: ${{ inputs.use_waf_solver || github.event_name == 'schedule' }}
        run: |
          mkdir -p tests/.integration-config
          cat > tests/.integration-config/config.yml <<'EOF'
          auth_forms_classes:
            - amazonorders.contrib.waf.capsolver.CapSolverWafForm
          EOF
      - name: Install WAF solver extras
        if: ${{ inputs.use_waf_solver || github.event_name == 'schedule' }}
        run: make install install-waf
      - name: Integration test
        run: make test-integration
      - name: Upload test output
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-output
          include-hidden-files: true
          path: tests/.integration-config/
          retention-days: 7
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./build/test-results
          report_type: test_results
